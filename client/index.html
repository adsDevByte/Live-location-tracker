<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <div class="login-card">
      <h1>🚀 Live Tracker</h1>
      <p class="subtitle">Login to continue</p>

      <form id="loginForm">
        <input 
          type="text" 
          id="username" 
          placeholder="Enter username" 
          required 
        />

        <button type="submit">Login</button>
      </form>

      <p class="hint">Try: adarsh / test / demo</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
